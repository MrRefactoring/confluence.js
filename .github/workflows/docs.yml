name: Docs

on:
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - 'src/**'
      - 'scripts/prepare-api-docs.ts'
      - 'typedoc.json'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Builds the API reference from src, then the site around it. Dead links are
      # not ignored, so a broken cross-reference fails here rather than shipping.
      - name: Build docs
        run: pnpm run docs:build
        env:
          NODE_OPTIONS: --max-old-space-size=8192

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5

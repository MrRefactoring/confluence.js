name: 🚀 Publish to NPM Dev Channel

on:
  workflow_dispatch

env:
  NODE_VERSION: '22.x'

permissions:
  contents: read
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: 🔄 Checkout code
        uses: actions/checkout@v7

      - name: ⚙️ Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org/

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v6

      - name: 📌 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🛠️ Run build
        run: pnpm run build

      # Two steps, because changesets only knows the release this branch leads to:
      # it moves package.json there, then dev-version.ts turns that into
      # <base>-dev.<n>, numbering from what is already on npm.
      - name: 🔖 Apply pending changesets
        run: pnpm changeset version

      - name: 🔖 Stamp dev version
        run: pnpm run version:dev

      - name: 📤 Publish dev snapshot to NPM
        run: pnpm publish --tag dev --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

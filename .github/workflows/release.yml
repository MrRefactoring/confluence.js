name: 🚀 Release

on:
  push:
    branches:
      - master

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: 🚀 Release
    runs-on: ubuntu-latest
    permissions:
      contents: write        # create git tags, push version commits
      pull-requests: write   # create "Version Packages" PR
      id-token: write        # npm provenance attestation

    steps:
      - name: 🔄 Checkout sources
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: ⚙️ Use Node.js 22.x
        uses: actions/setup-node@v7
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v6

      - name: 📌 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build
        run: pnpm run build

      - name: 🧪 Unit tests
        run: pnpm run test

      # What building cannot prove: that the exports map resolves and the packed
      # tarball actually imports. Publishing a broken one is not undoable.
      - name: 🔎 Are the types wrong?
        run: pnpm run check:attw

      - name: 🚚 Consumer smoke tests
        run: pnpm run check:consumers

      # Changesets action:
      # - If changesets are pending → creates/updates "Version Packages" PR
      # - If this IS the version commit (no pending changesets) → publishes to npm
      - name: 📦 Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm run release:publish
          version: pnpm run changeset:version
          title: 'chore(release): version packages'
          commit: 'chore(release): version packages'
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # changesets/action tags and releases only the packages it detects as
      # published, and it detects them by grepping the publish command's stdout for
      # the "New tag:" lines that only `changeset publish` prints — never `pnpm
      # publish`. So the publish path uploads to npm but leaves no tag behind, and
      # v3.0.0 had to be tagged by hand. This step closes that gap without touching
      # the known-good `pnpm publish --provenance` command.
      #
      # It fires on every master push and tells the two paths apart by the version in
      # the *committed* HEAD, not the working tree. The action's `version` step
      # rewrites package.json and deletes the changesets in place on the version-PR
      # path too — so the working tree always looks like the next release, and reading
      # it (or counting leftover changesets) mistakes the version-PR path for a
      # publish. Only the commit that merged the version PR actually carries the
      # bumped version, so:
      #   - HEAD still holds the current version → its tag exists → nothing to do
      #     (this is the version-PR path, or a re-run).
      #   - HEAD holds a new, untagged version  → the version PR merged and published,
      #     so tag that commit. Idempotent: the tag check makes re-runs safe.
      - name: 🏷️ Tag and release the published version
        if: steps.changesets.outputs.published != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="$(git show HEAD:package.json | jq -r .version)"
          tag="v${version}"

          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists — nothing to do (version-PR path or re-run)."
            exit 0
          fi

          awk -v h="## ${version}" '$0==h{f=1;next} /^## /{if(f)exit} f' CHANGELOG.md > /tmp/release-notes.md
          if [ -s /tmp/release-notes.md ]; then
            gh release create "${tag}" --target "${GITHUB_SHA}" --title "${tag}" --notes-file /tmp/release-notes.md
          else
            echo "No CHANGELOG section for ${version}; falling back to generated notes."
            gh release create "${tag}" --target "${GITHUB_SHA}" --title "${tag}" --generate-notes
          fi

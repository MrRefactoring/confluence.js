<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="confluence.js">
  <title>confluence.js</title>
  <defs>
    <linearGradient id="cfjs-a" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="cfjs-b" x1="1" y1="0" x2="0" y2="1">
